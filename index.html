<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABA Daily Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>ABA Daily Tracker</h1>

    <div class="card">
        <label>Client Name</label>
        <input type="text" id="client">

        <label>Date</label>
        <input type="date" id="date">

        <label>Therapist</label>
        <input type="text" id="therapist">
    </div>

    <div class="card">

        <h2>Targets</h2>

        <table>

            <thead>
                <tr>
                    <th>Skill</th>
                    <th>Result</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>Follow Directions</td>

                    <td>
                        <select>
                            <option>-</option>
                            <option>+</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Functional Communication</td>

                    <td>
                        <select>
                            <option>-</option>
                            <option>+</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>Transition</td>

                    <td>
                        <select>
                            <option>-</option>
                            <option>+</option>
                        </select>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

    <div class="card">

        <label>Session Notes</label>

        <textarea id="notes"></textarea>

    </div>

    <button onclick="saveData()">
        Save Session
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
